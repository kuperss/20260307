<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 舞光新品發表會 - 數位簽到</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary-color: #005CAF; /* 舞光藍 */
            --success-color: #28a745;
            --danger-color: #dc3545;
        }
        
        /* 自訂背景區塊 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: url('bg.png'); 
            background-color: #f8f9fa;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* 標題與視覺排版 */
        .header-section {
            text-align: center;
            margin-top: 40px;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .header-section h2 { margin: 0; color: var(--primary-color); font-size: 28px; }
        .header-section p { margin: 10px 0 0 0; color: #E36C0A; font-weight: bold; font-size: 18px; }

        /* 大大的掃描啟動按鈕 */
        #start-btn {
            background-color: #E3000F; /* 舞光紅 */
            color: white;
            font-size: 36px;
            font-weight: 900;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            margin-top: 30px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(227, 0, 15, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            transition: transform 0.1s;
        }
        #start-btn:active { transform: scale(0.95); }
        
        /* 掃描區塊容器 */
        #scanner-container {
            display: none;
            width: 90%;
            max-width: 500px;
            margin-top: 20px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            box-sizing: border-box;
        }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; }
        
        /* 優化後的報到人數按鈕 */
        .input-group { 
            margin: 10px 0 20px 0; 
            font-size: 20px; 
            font-weight: bold; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        #guestCountDisplay {
            width: 80px;
            padding: 10px;
            font-size: 28px;
            text-align: center;
            border-radius: 12px;
            border: 2px solid var(--primary-color);
            background-color: #f0f8ff;
            color: var(--primary-color);
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        #guestCountDisplay:active { background-color: var(--primary-color); color: white; }

        /* 數字快選底部面板 (Bottom Sheet) */
        #number-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 9998;
            align-items: flex-end; /* 讓內容靠底 */
            justify-content: center;
        }
        .number-panel {
            background: white;
            width: 100%;
            max-width: 500px;
            padding: 25px 20px 40px 20px;
            border-radius: 25px 25px 0 0;
            box-sizing: border-box;
            text-align: center;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .number-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .num-btn {
            background-color: #f4f4f4;
            color: #333;
            font-size: 28px;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            padding: 20px 0;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .num-btn:active { background-color: var(--primary-color); color: white; transform: scale(0.95); }

        /* 超大字體提示窗 */
        #custom-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            padding: 40px 20px;
            border-radius: 20px;
            width: 85%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        #modal-icon { font-size: 60px; margin-bottom: 10px; }
        #modal-message { font-size: 32px; font-weight: bold; margin-bottom: 30px; line-height: 1.4; color: #333; }
        .modal-btn {
            background-color: var(--primary-color);
            color: white;
            font-size: 24px;
            font-weight: bold;
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header-section" id="header-section">
        <h2>舞光 DANCELIGHT</h2>
        <p>中區經銷夥伴新品發表會</p>
    </div>

    <button id="start-btn">
        CLICK HERE 👆
    </button>

    <div id="scanner-container">
        <div class="input-group">
            <label>報到人數：</label>
            <div id="guestCountDisplay" onclick="openNumberPanel()">1</div>
            <input type="hidden" id="guestCount" value="1">
        </div>
        
        <div id="reader"></div>
        <h3 id="status-text" style="color: var(--primary-color);">請對準 QR Code</h3>
    </div>

    <div id="custom-modal">
        <div class="modal-content">
            <div id="modal-icon">✅</div>
            <div id="modal-message">客戶 S5A0310<br>報到成功！</div>
            <button class="modal-btn" onclick="closeModal()">繼續掃描</button>
        </div>
    </div>

    <div id="number-modal" onclick="closeNumberPanel(event)">
        <div class="number-panel" onclick="event.stopPropagation()">
            <h3 style="margin: 0; color: #333; font-size: 24px;">請選擇報到人數</h3>
            <div class="number-grid">
                <button class="num-btn" onclick="selectNumber(1)">1</button>
                <button class="num-btn" onclick="selectNumber(2)">2</button>
                <button class="num-btn" onclick="selectNumber(3)">3</button>
                <button class="num-btn" onclick="selectNumber(4)">4</button>
                <button class="num-btn" onclick="selectNumber(5)">5</button>
                <button class="num-btn" onclick="selectNumber(6)">6</button>
                <button class="num-btn" onclick="selectNumber(7)">7</button>
                <button class="num-btn" onclick="selectNumber(8)">8</button>
            </div>
        </div>
    </div>

    <script>
        const gasUrl = "https://script.google.com/macros/s/AKfycbztx1G3LDmTK0o_82lFODH6crxXiq4vBNxMgoniFnUA7lO_tK23PJTiUpOJVJIYeyXo/exec";
        
        let html5QrCode;
        let isProcessing = false;

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('scanner-container').style.display = 'block';

            html5QrCode = new Html5Qrcode("reader");

            const config = { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 };
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
            .catch(err => {
                alert("無法啟動相機，請確認是否已給予權限！");
                console.error(err);
            });
        });

        async function onScanSuccess(decodedText) {
            if (isProcessing) return; 
            isProcessing = true;
            
            const guestCount = document.getElementById('guestCount').value;
            document.getElementById('status-text').innerText = "資料傳送中...";
            
            html5QrCode.pause(true);

            try {
                await fetch(gasUrl, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ customerId: decodedText, count: guestCount })
                });

                showModal("✅", `客戶 ${decodedText}<br><span style="color:#28a745">報到成功！</span><br>共 ${guestCount} 人`);
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]); 

            } catch (error) {
                showModal("❌", `傳送失敗<br><span style="color:#dc3545">請檢查網路連線</span>`);
                console.error(error);
            }
        }

        /* --- 提示窗相關邏輯 --- */
        function showModal(icon, messageHtml) {
            document.getElementById('modal-icon').innerText = icon;
            document.getElementById('modal-message').innerHTML = messageHtml;
            document.getElementById('custom-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('custom-modal').style.display = 'none';
            document.getElementById('status-text').innerText = "請對準下一個 QR Code";
            
            // 每次成功報到後，將人數自動重置回 1 人
            document.getElementById('guestCountDisplay').innerText = "1";
            document.getElementById('guestCount').value = "1"; 
            
            isProcessing = false;
            if (html5QrCode.getState() === Html5QrcodeScannerState.PAUSED) {
                html5QrCode.resume();
            }
        }

        /* --- 數字快選面板邏輯 --- */
        function openNumberPanel() {
            document.getElementById('number-modal').style.display = 'flex';
        }

        // 點擊面板外部的半透明黑底時，也會自動關閉
        function closeNumberPanel(event) {
            document.getElementById('number-modal').style.display = 'none';
        }

        // 點擊數字按鈕後，更新畫面與隱藏欄位的值，並收起面板
        function selectNumber(num) {
            document.getElementById('guestCountDisplay').innerText = num;
            document.getElementById('guestCount').value = num;
            document.getElementById('number-modal').style.display = 'none';
        }
    </script>
</body>
</html>
